<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADAPTO - Smart TV App</title>
    <meta name="description" content="Universal Smart TV Application" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Preconnect для быстрой загрузки шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Оптимизация для Smart TV -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- Tizen specific -->
    <meta name="tizen-app-id" content="adapto.smarttv">
    
    <!-- webOS specific -->
    <meta name="webos-app-id" content="com.adapto.smarttv">
    
    <style>
      /* Базовые стили для предотвращения FOUC */
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loader */
      .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #0080ff;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader">Загрузка ADAPTO...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
