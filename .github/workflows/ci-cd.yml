name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            apps/front/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_DEBUG: ${{ vars.NEXT_PUBLIC_DEBUG }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_LOCALDATA: ${{ vars.NEXT_PUBLIC_LOCALDATA }}
        run: |
          export NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://example.com/api/v1}
          export NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://example.com/ws}
          export NEXT_PUBLIC_DEBUG=${NEXT_PUBLIC_DEBUG:-0}
          export NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
          export NEXT_PUBLIC_LOCALDATA=${NEXT_PUBLIC_LOCALDATA:-0}
          yarn build

      - name: Notify Telegram (Frontend failure)
        if: ${{ failure() || cancelled() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          BRANCH="$GITHUB_REF_NAME"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🔥 Frontend job failed on ${BRANCH} (${SHORT_SHA})%0ARepo: ${REPO}%0ARun: ${RUN_URL}"
          if [ -n "${TELEGRAM_BOT_TOKEN}" ] && [ -n "${TELEGRAM_CHAT_ID}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d disable_web_page_preview=true \
              -d text="${MSG}";
          fi

  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/back
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/back/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 || true

      # - name: Lint (flake8)
      #   run: flake8 . --exclude=.venv

      - name: Django checks
        env:
          DJANGO_SETTINGS_MODULE: adapto_back.settings
        run: |
          python manage.py check --deploy
          python manage.py makemigrations --check --dry-run

      - name: Run backend tests
        env:
          DJANGO_SETTINGS_MODULE: adapto_back.settings
        run: |
          python manage.py test --noinput --verbosity 2

      - name: Notify Telegram (Backend failure)
        if: ${{ failure() || cancelled() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          BRANCH="$GITHUB_REF_NAME"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🔥 Backend job failed on ${BRANCH} (${SHORT_SHA})%0ARepo: ${REPO}%0ARun: ${RUN_URL}"
          if [ -n "${TELEGRAM_BOT_TOKEN}" ] && [ -n "${TELEGRAM_CHAT_ID}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d disable_web_page_preview=true \
              -d text="${MSG}";
          fi

  notify-ci:
    name: Notify Telegram (CI status)
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    # Run regardless of previous job results so we can notify on failures
    if: ${{ always() }}
    steps:
      - name: Notify Telegram on CI failure/cancel
        # Send only if any of the CI jobs did not succeed
        if: ${{ needs.frontend.result != 'success' || needs.backend.result != 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          REPO="$GITHUB_REPOSITORY"
          BRANCH="$GITHUB_REF_NAME"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          FE_STATUS="${{ needs.frontend.result }}"
          BE_STATUS="${{ needs.backend.result }}"
          EMOJI="🔥"
          if [ "$FE_STATUS" = "cancelled" ] || [ "$BE_STATUS" = "cancelled" ]; then EMOJI="⚠️"; fi
          MSG="$EMOJI CI status on ${BRANCH} (${SHORT_SHA})%0ARepo: ${REPO}%0AFrontend: ${FE_STATUS}%0ABackend: ${BE_STATUS}%0ARun: ${RUN_URL}"
          if [ -n "${TELEGRAM_BOT_TOKEN}" ] && [ -n "${TELEGRAM_CHAT_ID}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d disable_web_page_preview=true \
              -d text="${MSG}";
          else
            echo "Telegram secrets are missing; skipping notification";
          fi


  deploy:
    name: Deploy to Production
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [frontend, backend, notify-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Print context
        run: |
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Select auth mode and defaults
        run: |
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "AUTH_MODE=key" >> $GITHUB_ENV
          elif [ -n "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "AUTH_MODE=password" >> $GITHUB_ENV
          else
            echo "AUTH_MODE=none" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.SSH_PORT }}" ]; then
            echo "SSH_PORT=${{ secrets.SSH_PORT }}" >> $GITHUB_ENV
          else
            echo "SSH_PORT=22" >> $GITHUB_ENV
          fi

      - name: Deploy over SSH (key + optional sudo)
        if: ${{ env.AUTH_MODE == 'key' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUDO_PASSWORD: ${{ secrets.SUDO_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          request_pty: true
          script_stop: true
          command_timeout: 60m
          envs: SUDO_PASSWORD
          script: |
            set -euo pipefail
            echo "==> Starting deployment on $(hostname) as $(whoami)"
            if [ -n "${SUDO_PASSWORD:-}" ]; then
              echo "==> Switching to root via sudo (with password)"
              echo "$SUDO_PASSWORD" | sudo -S -p '' bash -lc '
                set -euo pipefail
                cd /srv/adapto
                echo "==> Running make deploy-prod"
                make deploy-prod
                echo "==> Running health checks"
                make health || true
                echo "==> Deployment finished"
              '
            else
              echo "==> Switching to root via sudo (passwordless)"
              sudo bash -lc '
                set -euo pipefail
                cd /srv/adapto
                echo "==> Running make deploy-prod"
                make deploy-prod
                echo "==> Running health checks"
                make health || true
                echo "==> Deployment finished"
              '
            fi

      - name: Deploy over SSH (password + sudo)
        if: ${{ env.AUTH_MODE == 'password' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUDO_PASSWORD: ${{ secrets.SUDO_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          request_pty: true
          script_stop: true
          command_timeout: 60m
          envs: SUDO_PASSWORD,SSH_PASSWORD
          script: |
            set -euo pipefail
            echo "==> Starting deployment on $(hostname) as $(whoami)"
            SUDO_PASSWORD="${SUDO_PASSWORD:-${SSH_PASSWORD:-}}"
            echo "==> Switching to root via sudo"
            echo "$SUDO_PASSWORD" | sudo -S -p '' bash -lc '
              set -euo pipefail
              cd /srv/adapto
              echo "==> Running make deploy-prod"
              make deploy-prod
              echo "==> Running health checks"
              make health || true
              echo "==> Deployment finished"
            '

      - name: Fail if no SSH credentials provided
        if: ${{ env.AUTH_MODE == 'none' }}
        run: |
          echo "No SSH credentials provided (SSH_PRIVATE_KEY or SSH_PASSWORD)" >&2
          exit 1

      # Telegram notifications for deployment runs (main branch)
      - name: Notify Telegram (Deploy success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          REPO="$GITHUB_REPOSITORY"
          BRANCH="$GITHUB_REF_NAME"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🚀 Deploy succeeded on ${BRANCH} (${SHORT_SHA})%0ARepo: ${REPO}%0ARun: ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d disable_web_page_preview=true \
            -d text="${MSG}"

      - name: Notify Telegram (Deploy failure)
        if: failure() || cancelled()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          BRANCH="$GITHUB_REF_NAME"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          FE_STATUS="${{ needs.frontend.result }}"
          BE_STATUS="${{ needs.backend.result }}"
          MSG="🔥 Deploy failed on ${BRANCH} (${SHORT_SHA})%0ARepo: ${REPO}%0AFrontend: ${FE_STATUS}%0ABackend: ${BE_STATUS}%0ARun: ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d disable_web_page_preview=true \
            -d text="${MSG}"


