# Unified docker-compose for production (Caddy, backend, frontend, DB, Redis, MediaMTX, SeaweedFS)

services:
  # ----------------------------------------------------------------------------
  # Web reverse proxy
  # ----------------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # HLS files for static serving
      - ./media/hls:/var/www/hls:ro
    environment:
      - API_BACKEND_UPSTREAM=back-express:8001
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
      - back-express

  # ----------------------------------------------------------------------------
  # Backend (Django)
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./apps/back
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DEBUG=0
      - LOG_LEVEL=WARN
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - backend_media:/app/media
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser_auto &&
             gunicorn adapto_back.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # ----------------------------------------------------------------------------
  # Backend Express.js (легковесный API без ORM)
  # ----------------------------------------------------------------------------
  back-express:
    build:
      context: ./apps/back.js
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8001
      - EXPRESS_DATABASE_URL=postgresql://${POSTGRES_USER:-adapto}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-adapto}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adapto}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-adapto}
      - EXPRESS_DB_SSL=0
      - EXPRESS_DB_POOL_SIZE=10
      - EXPRESS_DB_IDLE_TIMEOUT=30000
      - CORS_ORIGIN=http://localhost
      - MEDIA_ROOT=/app/media
      - MEDIA_URL_PREFIX=/api/v1/media
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
      - backend_media:/app/media:ro
    depends_on:
      - postgres

  # ----------------------------------------------------------------------------
  # Frontend (Next.js)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_WS_URL: /ws
        NEXT_PUBLIC_DEBUG: 0
        NEXT_PUBLIC_GA_ID: ""
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=/ws
      - NEXT_PUBLIC_DEBUG=0
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    volumes:
      # Persist Next.js image optimization cache across restarts
      - next_image_cache:/app/.next/cache/images
    depends_on:
      - backend
      - back-express

  # ----------------------------------------------------------------------------
  # Datastores
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-adapto}
      - POSTGRES_USER=${POSTGRES_USER:-adapto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}

  redis:
    image: redis:7
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ----------------------------------------------------------------------------
  # MediaMTX streaming server
  # ----------------------------------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx
    container_name: mediamtx
    restart: always
    environment:
      - TZ=${TZ:-Asia/Almaty}
      - MTX_RTSPTRANSPORTS=tcp
      - MTX_WEBRTCADDITIONALHOSTS=${MEDIAMTX_WEBRTC_HOSTS:-localhost}
    ports:
      - "8554:8554"    # RTSP
      - "1935:1935"    # RTMP
      - "8880:8888"    # HLS (changed from 8888 to avoid conflict with SeaweedFS filer)
      - "8889:8889"    # WebRTC
      - "8890:8890/udp" # WebRTC UDP
      - "8189:8189/udp" # WebRTC UDP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./media/hls:/app/media/hls
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro

  hlsx:
    container_name: hlsx
    build:
      context: ./apps/hlsx
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8280:8280"
    volumes:
      - ./apps/hlsx/config.json:/app/config.json
      - ./media/hls:/app/media/hls
      - /srv/hls:/srv/hls

volumes:
  backend_media:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  next_image_cache:
    driver: local
