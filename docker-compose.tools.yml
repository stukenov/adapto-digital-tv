name: tools

services:
  filebrowser:
    build:
      context: tools/filebrowserx
      dockerfile: Dockerfile
    container_name: filebrowser
    restart: always
    ports:
      - "8080:80"
    environment:
      - PUID=0
      - PGID=0
      - NET_TBF_RATE=1mbit
      - NET_TBF_BURST=16kb
      - NET_TBF_LATENCY=400ms
      - NET_INGRESS_RATE=1mbit
      - NET_INGRESS_BURST=16kb
    # Важно: используем :slave (или :rslave) чтобы симлинки на /srv/ffplayout-media и /mnt работали корректно
    volumes:
      - /srv:/srv:rslave
      - /mnt:/mnt:rslave
      - filebrowser_database:/database
      - filebrowser_config:/config
    cap_add:
      - NET_ADMIN
    cpus: "1" # 50% of a single CPU
    mem_limit: 128m
    pids_limit: 256
    blkio_config:
      weight: 100
      device_read_bps:
        - path: ${FILEBROWSER_BLK_DEV:-/dev/sda}
          rate: ${FILEBROWSER_READ_BPS:-10mb}
      device_write_bps:
        - path: ${FILEBROWSER_BLK_DEV:-/dev/sda}
          rate: ${FILEBROWSER_WRITE_BPS:-10mb}

